name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  build:
    runs-on: ${{ matrix.platform.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { name: amd64, runner: ubuntu-latest, docker: linux/amd64 }
          - { name: arm64, runner: ubuntu-24.04-arm, docker: linux/arm64 }
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Get short SHA
        id: short-sha
        run: echo "sha=$(git rev-parse --short ${{ github.sha }})" >> $GITHUB_OUTPUT

      - name: Build and push (${{ matrix.platform.name }})
        uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          file: ./docker/Dockerfile.alpine
          platforms: ${{ matrix.platform.docker }}
          tags: ghcr.io/${{ github.repository }}:${{ steps.short-sha.outputs.sha }}-${{ matrix.platform.name }}
          cache-from: type=gha,scope=alpine-${{ matrix.platform.name }}
          cache-to: type=gha,mode=max,scope=alpine-${{ matrix.platform.name }}
          provenance: false

  merge:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Get short SHA
        id: short-sha
        run: echo "sha=$(git rev-parse --short ${{ github.sha }})" >> $GITHUB_OUTPUT

      - name: Add metadata to Docker image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
          flavor: |
            latest=false

      - name: Create and push multi-arch manifest
        run: |
          TAG_FLAGS=()
          while IFS= read -r tag; do
            [[ -n "$tag" ]] && TAG_FLAGS+=(--tag "$tag")
          done <<< "${{ steps.meta.outputs.tags }}"

          docker buildx imagetools create \
            "${TAG_FLAGS[@]}" \
            "ghcr.io/${{ github.repository }}:${{ steps.short-sha.outputs.sha }}-amd64" \
            "ghcr.io/${{ github.repository }}:${{ steps.short-sha.outputs.sha }}-arm64"
